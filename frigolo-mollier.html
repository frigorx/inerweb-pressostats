<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRIGOLO Mollier v2 — Diagramme log(p)-h | InerWeb Fluide</title>
<style>
:root{--navy:#0f2d52;--navy-mid:#1a4a6e;--orange:#e8914a;--orange-hover:#d47a35;--orange-light:#f3b07a;--orange-warm:#fdf6ef;--orange-glow:rgba(232,145,74,.35);--turq:#2aafaf;--turq-light:#eef8f7;--good:#27ae60;--good-bg:#eef7f1;--bad:#e74c3c;--bad-bg:#fdeaea;--bg:#faf7f2;--bg-end:#f0ebe3;--card:#fff;--card-border:#ece4da;--text:#2c3e50;--text-strong:#0f2d52;--muted:#5a7080;--shadow:0 4px 16px rgba(15,45,82,.07);--r:20px;--r-card:22px;--r-pill:999px;--font:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;--mono:'Courier New',Consolas,monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(180deg,var(--bg),var(--bg-end));background-attachment:fixed;color:var(--text);font-family:var(--font);font-size:15px;line-height:1.55;min-height:100vh}
.app{max-width:1150px;margin:0 auto;padding:10px 14px}
.hdr{background:linear-gradient(135deg,#0f2d52,#1a4a6e,#2aafaf);padding:12px 18px;display:flex;align-items:center;gap:12px;border-bottom:4px solid var(--orange);border-radius:0 0 0 40px;box-shadow:0 4px 20px rgba(15,45,82,.15);margin-bottom:14px}
.logo-slot{background:rgba(255,255,255,.95);border-radius:14px;padding:4px 8px;display:flex;align-items:center}
.hdr-center{flex:1;text-align:center}
.hdr-center h1{font-size:1.05rem;font-weight:800;color:#fff;letter-spacing:2px}
.hdr-center .sub{font-size:.7rem;color:rgba(255,255,255,.85)}
.ver{display:inline-block;background:var(--orange);color:#fff;padding:2px 8px;border-radius:var(--r-pill);font-size:.58rem;font-weight:700;margin-left:4px}

.cd{background:var(--card);border:1px solid var(--card-border);border-radius:var(--r-card);box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.cd-in{padding:20px}
.cd-orange{border-top:4px solid var(--orange)}
.cd-navy{border-top:4px solid var(--navy)}
.cd-turq{border-top:4px solid var(--turq)}

.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:10px 0}
.fg{display:flex;flex-direction:column;gap:3px}
.fg label{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select{padding:8px 10px;border:2px solid var(--card-border);border-radius:10px;font-family:var(--mono);font-size:.88rem;font-weight:700;text-align:center;transition:border-color .2s}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,145,74,.1)}
.fg select{text-align:left;font-family:var(--font)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:10px 20px;font-family:var(--font);font-size:.85rem;font-weight:700;border:2px solid transparent;border-radius:var(--r-pill);cursor:pointer;transition:all .2s}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:var(--shadow)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-o{background:var(--orange);color:#fff}.btn-o:hover:not(:disabled){background:var(--orange-hover)}
.btn-n{background:var(--navy);color:#fff}
.btn-t{background:var(--turq);color:#fff}
.btn-ol{background:transparent;border-color:var(--card-border);color:var(--muted)}.btn-ol:hover:not(:disabled){border-color:var(--orange);color:var(--orange)}
.btn-blk{width:100%}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));gap:8px;margin:10px 0}
.kpi{background:var(--bg);border:1px solid var(--card-border);border-radius:14px;padding:8px;text-align:center}
.kpi .kv{font-family:var(--mono);font-size:1.2rem;font-weight:800;color:var(--navy)}
.kpi .kl{font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-weight:600;margin-top:2px}
.kpi.warn .kv{color:var(--orange)}.kpi.bad .kv{color:var(--bad)}.kpi.good .kv{color:var(--good)}

/* SVG */
.svg-wrap{background:#fff;border:2px solid var(--card-border);border-radius:var(--r);overflow:hidden;position:relative;margin:10px 0;cursor:crosshair}
.svg-wrap svg{display:block;width:100%;height:auto}

/* Crosshair tooltip */
.ch-tip{position:absolute;pointer-events:none;background:rgba(15,45,82,.92);color:#fff;padding:6px 10px;border-radius:8px;font-size:.72rem;font-family:var(--mono);font-weight:600;line-height:1.5;white-space:nowrap;display:none;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.25)}

/* OPTIONS */
.opts{display:flex;flex-wrap:wrap;gap:12px;align-items:center;font-size:.78rem;margin:10px 0}
.opts label{display:flex;align-items:center;gap:5px;cursor:pointer;color:var(--muted);font-weight:600}
.opts input[type=checkbox]{accent-color:var(--orange)}

/* LEGEND */
.legend{display:flex;flex-wrap:wrap;gap:12px;font-size:.72rem;color:var(--muted);margin:8px 0}
.legend span{display:flex;align-items:center;gap:5px}
.legend .dot{width:14px;height:3px;border-radius:2px}

/* EXERCISE */
.exo-bar{background:linear-gradient(135deg,var(--navy),var(--navy-mid));color:#fff;border-radius:14px;padding:14px 18px;margin:10px 0;display:none}
.exo-bar.on{display:block;animation:fadeUp .3s ease}
.exo-bar h3{font-size:.88rem;font-weight:700;margin-bottom:6px}
.exo-bar p{font-size:.78rem;opacity:.85;line-height:1.5}
.exo-bar .exo-pts{display:flex;gap:8px;margin-top:8px}
.exo-pt{padding:6px 14px;border-radius:var(--r-pill);font-size:.78rem;font-weight:700;border:2px solid rgba(255,255,255,.3);color:rgba(255,255,255,.5)}
.exo-pt.active{border-color:#fff;color:#fff;background:rgba(255,255,255,.15)}
.exo-pt.done{border-color:var(--good);color:var(--good);background:rgba(39,174,96,.2)}

/* INFO */
.info-box{padding:14px;background:var(--orange-warm);border:1px dashed var(--orange-light);border-radius:14px;font-size:.82rem;line-height:1.6;margin:10px 0;color:#5a3e1e}
.info-box strong{color:var(--orange)}
.info-box.turq{background:var(--turq-light);border-color:#b8dfe0;color:#1a5050}
.info-box.turq strong{color:var(--turq)}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:12px}
.tab{padding:8px 16px;border:2px solid var(--card-border);border-radius:14px 14px 0 0;background:var(--bg);font-size:.8rem;font-weight:700;cursor:pointer;color:var(--muted);transition:all .2s}
.tab.on{background:var(--card);border-bottom-color:var(--card);color:var(--navy)}
.tab-pane{display:none}.tab-pane.on{display:block}

/* RESULT */
.res-banner{text-align:center;padding:18px;border-radius:var(--r-card);margin:10px 0}
.res-banner.win{background:linear-gradient(135deg,var(--good),#2ecc71);color:#fff}
.res-banner.lose{background:linear-gradient(135deg,#c0392b,var(--bad));color:#fff}

.footer{text-align:center;padding:18px 0;font-size:.68rem;color:var(--muted)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@media print{
  body{background:#fff!important}
  .hdr,.tabs,.cd-orange,.opts,.btn-row,.exo-bar,.footer,.ch-tip{display:none!important}
  .svg-wrap{border:1px solid #999}
  .kpi-row{break-inside:avoid}
}
@media(max-width:600px){
  .form-grid{grid-template-columns:1fr 1fr}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .btn-row{flex-direction:column}
}
</style>
</head>
