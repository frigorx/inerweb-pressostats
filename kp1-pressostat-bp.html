*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Calibri,'Segoe UI',Tahoma,sans-serif;font-size:16px;line-height:1.7;min-height:100vh;background:linear-gradient(170deg,#e0e7f0 0%,#c5d2e3 100%);color:#1a2332;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none}
/* ═══ MODE DYS ═══ */
body.dys-mode{font-family:'OpenDyslexic','Lexend',Calibri,sans-serif!important;word-spacing:0.35em;letter-spacing:0.05em;line-height:2}
body.dys-mode *{font-family:inherit!important}
body.dys-mode button{font-family:inherit!important}
body.dys-mode p,body.dys-mode div,body.dys-mode span{word-spacing:0.35em}
/* ═══ TAILLE AGRANDIE ═══ */
body.big-text{font-size:20px;line-height:2}
body.big-text h2{font-size:28px!important}
body.big-text p,body.big-text div{font-size:inherit}
/* Combo DYS + big */
body.dys-mode.big-text{font-size:22px;line-height:2.1;word-spacing:0.4em}
/* ═══ CONTRASTE AUGMENTÉ ═══ */
body.high-contrast{background:#1a1a2e!important;color:#e8e8e8}
body.high-contrast .slide-card{background:#22223a!important;border-color:#555!important;color:#e8e8e8!important}
body.high-contrast .slide-card h2{color:#7db8ff!important}
body.high-contrast .slide-card strong{color:#ffcc66!important}
body.high-contrast .slide-card p{color:#ccc!important}
body.high-contrast .exo-card{background:#22223a!important;border-color:#555!important;color:#e8e8e8!important}
body.high-contrast .exo-card h2,body.high-contrast .exo-card h3{color:#7db8ff!important}
body.high-contrast .exo-card strong{color:#ffcc66!important}
body.high-contrast table{border:1px solid #555}
body.high-contrast th{background:#333!important;color:#ddd!important}
body.high-contrast td{color:#ddd!important;border-bottom:1px solid #444}
body.high-contrast tr:nth-child(odd){background:#2a2a3e!important}
body.high-contrast tr:nth-child(even){background:#22223a!important}
body.high-contrast footer{border-color:#444!important}
body.high-contrast footer p,body.high-contrast footer span{color:#888!important}
@media print{body{background:white!important}.no-print{display:none!important}}
