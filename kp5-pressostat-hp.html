*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Calibri,'Segoe UI',Tahoma,sans-serif;font-size:16px;line-height:1.7;min-height:100vh;background:linear-gradient(170deg,#f0e0e0 0%,#e3c5c5 100%);color:#1a2332;-webkit-font-smoothing:antialiased}

body.high-contrast .slide-card strong{color:#ffcc66!important}
body.high-contrast .exo-card{background:#3a2222!important;border-color:#555!important;color:#e8e8e8!important}
body.high-contrast .exo-card h2,.high-contrast .exo-card h3{color:#ff9999!important}
body.high-contrast .exo-card strong{color:#ffcc66!important}
body.high-contrast table{border:1px solid #555}
body.high-contrast th{background:#4a2a2a!important;color:#ddd!important}
body.high-contrast td{color:#ddd!important;border-bottom:1px solid #444}
body.high-contrast tr:nth-child(odd){background:#3e2a2a!important}

body.high-contrast footer{border-color:#444!important}
body.high-contrast footer p,body.high-contrast footer span{color:#888!important}
@media print{body{background:white!important}.no-print{display:none!important}}
