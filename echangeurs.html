<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Échangeurs - Évaporateur & Condenseur</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Segoe UI', Calibri, sans-serif;
            font-size: 13px;
            background: #f5f7fa;
            color: #1a2332;
            padding: 8px;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .nav-tab {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px 8px 0 0;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-tab.evap { background: #e3f2fd; color: #1565c0; }
        .nav-tab.evap.active { background: #1976D2; color: white; }
        .nav-tab.cond { background: #ffebee; color: #c62828; }
        .nav-tab.cond.active { background: #c62828; color: white; }
        .nav-tab.both { background: #f3e5f5; color: #7b1fa2; }
        .nav-tab.both.active { background: #7b1fa2; color: white; }

        .view-container {
            flex: 1;
            display: none;
            min-height: 0;
        }
        .view-container.active {
            display: flex;
            flex-direction: column;
        }

        .dual-view {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            flex: 1;
            min-height: 0;
        }

        .single-view {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .panel {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 8px;
            display: flex;
            flex-direction: column;
            min-height: 0;
            flex: 1;
        }

        .panel-header {
            text-align: center;
            padding: 4px 0 8px;
            border-bottom: 2px solid #eee;
            margin-bottom: 6px;
        }
        .panel-header.evap { border-bottom-color: #1976D2; }
        .panel-header.cond { border-bottom-color: #c62828; }
        .panel-header h2 { font-size: 1rem; font-weight: 600; }
        .panel-header.evap h2 { color: #1976D2; }
        .panel-header.cond h2 { color: #c62828; }
        .panel-header p { font-size: 0.75rem; color: #666; }

        svg { flex: 1; width: 100%; min-height: 0; }

        .controls-row {
            display: flex;
            gap: 10px;
            padding: 8px;
            background: #fafafa;
            border-radius: 6px;
            margin-top: 6px;
            align-items: center;
            flex-wrap: wrap;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 1;
            min-width: 140px;
        }

        .control-item label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #555;
            white-space: nowrap;
        }

        .control-item input[type="range"] {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 3px;
            cursor: pointer;
        }

        .control-item input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .slider-evap::-webkit-slider-thumb { background: #1976D2; }
        .slider-cond::-webkit-slider-thumb { background: #c62828; }

        .control-value {
            font-weight: 700;
            font-size: 0.85rem;
            min-width: 50px;
            text-align: right;
        }
        .control-value.evap { color: #1976D2; }
        .control-value.cond { color: #c62828; }

        .measures-row {
            display: flex;
            gap: 8px;
            margin-top: 6px;
        }

        .measure-box {
            flex: 1;
            background: #f5f5f5;
            border-radius: 6px;
            padding: 6px 8px;
            text-align: center;
        }
        .measure-box.evap { background: #e3f2fd; }
        .measure-box.cond { background: #ffebee; }

        .measure-label { font-size: 0.7rem; color: #777; }
        .measure-value { font-size: 1.1rem; font-weight: 700; }
        .measure-value.evap { color: #1976D2; }
        .measure-value.cond { color: #c62828; }
        .measure-value.ok { color: #2e7d32; }
        .measure-value.warning { color: #f57c00; }
        .measure-value.danger { color: #d32f2f; }

        .diagnostic-box {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-top: 6px;
            text-align: center;
        }
        .diagnostic-box.ok { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #2e7d32; }
        .diagnostic-box.warning { background: #fff3e0; color: #e65100; border-left: 4px solid #f57c00; }
        .diagnostic-box.danger { background: #ffebee; color: #c62828; border-left: 4px solid #c62828; animation: pulse 0.5s infinite alternate; }

        @keyframes pulse { from { opacity: 1; } to { opacity: 0.7; } }

        .legend-row {
            display: flex;
            gap: 15px;
            font-size: 0.75rem;
            padding: 6px 10px;
            background: #fafafa;
            border-radius: 4px;
            margin-top: 4px;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-dot { width: 14px; height: 10px; border-radius: 2px; }

        .bubble, .particle { fill: rgba(255,255,255,0.85); }
    </style>
</head>
